name: ICE repro – instrument-coverage + test entrypoint

on:
  workflow_dispatch:
    inputs:
      toolchain:
        description: "Rust nightly toolchain (e.g. nightly or nightly-2026-07-13)"
        required: true
        default: "nightly"
        type: string

jobs:
  repro:
    name: Reproduce ICE (toolchain=${{ inputs.toolchain }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rustup toolchain
        run: rustup toolchain install ${{ inputs.toolchain }} --no-self-update

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Print compiler version
        run: rustc +"${{ inputs.toolchain }}" --version --verbose

      - name: Run repro script
        run: |
          chmod +x ice-instrument-coverage-test-entrypoint/repro.sh
          ice-instrument-coverage-test-entrypoint/repro.sh \
            --toolchain "${{ inputs.toolchain }}"

      - name: Upload ICE logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ice-logs-${{ inputs.toolchain }}
          path: ice-instrument-coverage-test-entrypoint/rustc-ice-*.txt
          if-no-files-found: warn

name: ICE repro – instrument-coverage + test entrypoint

on:
  workflow_dispatch:
    inputs:
      edition:
        description: "Rust edition"
        required: true
        default: "2024"
        type: choice
        options:
          - "2024"
          - "2021"
      toolchain:
        description: "Rust nightly toolchain (e.g. nightly or nightly-2026-07-13)"
        required: true
        default: "nightly"
        type: string

jobs:
  repro:
    name: Reproduce ICE (edition=${{ inputs.edition }}, toolchain=${{ inputs.toolchain }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rustup toolchain
        run: rustup toolchain install ${{ inputs.toolchain }} --no-self-update

      - name: Run repro script
        run: |
          chmod +x ice-instrument-coverage-test-entrypoint/repro.sh
          ice-instrument-coverage-test-entrypoint/repro.sh \
            --edition "${{ inputs.edition }}" \
            --toolchain "${{ inputs.toolchain }}"
